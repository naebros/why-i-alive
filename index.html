<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPT Dark Style</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #121212;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    h1 {
      font-weight: 600;
      font-size: 2rem;
      margin-bottom: 30px;
      text-align: center;
    }

    button {
      background-color: #2c2c2e;
      color: #ffffff;
      border: none;
      padding: 14px 28px;
      font-size: 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      font-weight: 500;
    }

    button:disabled {
      background-color: #555555;
      cursor: not-allowed;
    }

    button:hover:not(:disabled) {
      background-color: #3a3a3c;
      transform: translateY(-2px);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
      background-color: #2c2c2e;
    }

    p {
      margin-top: 15px;
      font-size: 18px;
      color: #d1d1d1;
    }
  </style>
</head>
<body>

  <h1>Select this button, if you don't know why you live.</h1>
  <button id="clickButton">Why i need to live?</button>
  <p>Нажато: <span id="count">0</span> раз</p>

  <script>
    const button = document.getElementById('clickButton');
    const countDisplay = document.getElementById('count');

    // Проверяем, нажимал ли пользователь раньше
    let clicked = localStorage.getItem('userClicked') === 'true';

    if (clicked) {
      button.disabled = true;
      countDisplay.textContent = 1; // показываем что уже нажали
    }

    button.addEventListener('click', () => {
      if (!clicked) {
        countDisplay.textContent = 1;
        button.disabled = true;
        localStorage.setItem('userClicked', 'true');
        clicked = true;
      }
    });
  </script>

</body>
</html>
